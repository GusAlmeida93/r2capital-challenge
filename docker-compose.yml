x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
  AIRFLOW__CORE__FERNET_KEY: ""
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "${AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION:-false}"
  AIRFLOW__CORE__LOAD_EXAMPLES: "${AIRFLOW__CORE__LOAD_EXAMPLES:-false}"
  AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
  AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
  PYTHONPATH: "/opt/airflow:/opt/airflow/include"
  LANDING_PATH: ${LANDING_PATH:-/opt/airflow/data/landing}
  ARCHIVE_PATH: ${ARCHIVE_PATH:-/opt/airflow/data/archive}
  DUCKDB_PATH: ${DUCKDB_PATH:-/opt/airflow/data/warehouse/duckdb.db}
  EXPORT_PATH: ${EXPORT_PATH:-/opt/airflow/data/exports}
  LOG_PATH: ${LOG_PATH:-/opt/airflow/logs}
  DBT_PROJECT_DIR: ${DBT_PROJECT_DIR:-/opt/airflow/include/dbt}
  DBT_PROFILES_DIR: ${DBT_PROFILES_DIR:-/opt/airflow/include/dbt}
  DBT_LOG_PATH: ${DBT_LOG_PATH:-/opt/airflow/logs/dbt}
  DBT_TARGET_PATH: ${DBT_TARGET_PATH:-/opt/airflow/include/dbt/target}

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-r2-pipeline:latest}
  build: .
  environment:
    <<: *airflow-env
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./include:/opt/airflow/include
    - ./logs:/opt/airflow/logs
    - ./data:/opt/airflow/data
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        mkdir -p /opt/airflow/data/landing /opt/airflow/data/archive /opt/airflow/data/warehouse \
                 /opt/airflow/data/exports/raw /opt/airflow/data/exports/silver /opt/airflow/data/exports/gold \
                 /opt/airflow/logs/airflow /opt/airflow/logs/dbt /opt/airflow/logs/scripts \
                 /opt/airflow/include/dbt/target /opt/airflow/include/dbt/dbt_packages \
                 /opt/airflow/include/dbt/logs
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/data /opt/airflow/logs \
                                          /opt/airflow/include/dbt/target \
                                          /opt/airflow/include/dbt/dbt_packages \
                                          /opt/airflow/include/dbt/logs || true
        airflow db migrate
        airflow users create \
          --username "${_AIRFLOW_WWW_USER_USERNAME:-admin}" \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com \
          --password "${_AIRFLOW_WWW_USER_PASSWORD:-admin}" || true
        # Install dbt packages once into the mounted dbt_packages folder so
        # subsequent dbt runs don't need to re-download.
        su airflow -s /bin/bash -c "cd /opt/airflow/include/dbt && /home/airflow/.local/bin/dbt deps --profiles-dir /opt/airflow/include/dbt" || echo "dbt deps step skipped/failed — check container logs"
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-admin}
    user: "0:0"
    restart: "no"

  scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  duckdb-ui:
    image: ${AIRFLOW_IMAGE_NAME:-r2-pipeline:latest}
    build: .
    command: ["python", "/opt/airflow/include/scripts/duckdb_ui.py"]
    environment:
      EXPORT_PATH: ${EXPORT_PATH:-/opt/airflow/data/exports}
      # Relay listens on 14213 inside the container and forwards to the UI
      # extension on 127.0.0.1:4213. The host-facing port stays 4213.
      DUCKDB_UI_PUBLIC_PORT: "14213"
      DUCKDB_UI_BACKEND_PORT: "4213"
      LOG_PATH: ${LOG_PATH:-/opt/airflow/logs}
      PYTHONPATH: "/opt/airflow/include"
    ports:
      - "${DUCKDB_UI_PORT:-4213}:14213"
    volumes:
      - ./data:/opt/airflow/data
      - ./include:/opt/airflow/include
      - ./logs:/opt/airflow/logs
    user: "${AIRFLOW_UID:-50000}:0"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume:
