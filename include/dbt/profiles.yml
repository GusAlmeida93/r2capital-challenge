r2:
  target: dev
  outputs:
    dev:
      type: trino
      method: none
      user: "{{ env_var('TRINO_USER', 'dbt') }}"
      host: "{{ env_var('TRINO_HOST', 'trino') }}"
      port: "{{ env_var('TRINO_PORT', '8080') | int }}"
      database: "{{ env_var('TRINO_CATALOG', 'lakehouse') }}"
      schema: "{{ env_var('TRINO_SCHEMA', 'raw') }}"
      http_scheme: "{{ env_var('TRINO_HTTP_SCHEME', 'http') }}"
      threads: 4
      prepared_statements_enabled: false
