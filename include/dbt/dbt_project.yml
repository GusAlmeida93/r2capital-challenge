name: 'r2_pipeline'
version: '1.0.0'
profile: 'r2'
config-version: 2

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  landing_path: "{{ env_var('LANDING_PATH', '/opt/airflow/data/landing') }}"

snapshots:
  r2_pipeline:
    +target_schema: raw
    +tags: ["raw", "snapshot"]

models:
  r2_pipeline:
    raw:
      +schema: raw
      +materialized: incremental
      +tags: ["raw"]
    silver:
      +schema: silver
      +materialized: incremental
      +tags: ["silver"]
      +on_schema_change: append_new_columns
    gold:
      +schema: gold
      +materialized: table
      +tags: ["gold"]
