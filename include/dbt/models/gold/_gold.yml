version: 2

models:
  - name: rpt_transactions_by_batch
    description: "Output 1 — Transactions processed by batch date (latest 40)."
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 0
          max_value: 40
    columns:
      - name: snapshot_date
        data_tests: [not_null]
      - name: batch_date
        data_tests:
          - not_null
          - unique
      - name: total_raw_transactions
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: valid_transactions
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: invalid_transactions
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: processing_date
        data_tests: [not_null]

  - name: rpt_sales_by_transaction_date
    description: "Output 2 — Sales stats per transaction date (latest 40)."
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 0
          max_value: 40
    columns:
      - name: snapshot_date
        data_tests: [not_null]
      - name: transaction_date
        data_tests:
          - not_null
          - unique
      - name: stores_with_transactions
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
      - name: total_sales_amount
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: total_sales_average
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: month_accumulated_sales
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: top_store_token
        data_tests:
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
              row_condition: "top_store_token is not null"

  - name: rpt_top_5_stores_by_date
    description: "Output 3 — Top 5 stores per transaction date (last 10 dates, up to 50 rows)."
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 0
          max_value: 50
      - dbt_expectations.expect_compound_columns_to_be_unique:
          column_list: ["transaction_date", "top_rank_id"]
    columns:
      - name: snapshot_date
        data_tests: [not_null]
      - name: transaction_date
        data_tests: [not_null]
      - name: top_rank_id
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              value_set: [1, 2, 3, 4, 5]
      - name: store_total_sales
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: store_token
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
